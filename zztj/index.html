<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资治通鉴精读 - 目录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8B4513;
            --secondary-color: #D4A574;
            --bg-color: #FDF6E3;
            --text-color: #3D2914;
            --accent-color: #C41E3A;
            --card-bg: #FFFBF0;
            --border-color: #D4A574;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background-color: var(--bg-color);
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D4A574' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                linear-gradient(to bottom, rgba(253,246,227,0.9), rgba(253,246,227,0.9));
            color: var(--text-color);
            line-height: 1.8;
        }

        /* 头部装饰 */
        .header-decoration {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #8B4513 100%);
            height: 8px;
            position: relative;
        }

        .header-decoration::before,
        .header-decoration::after {
            content: '❖';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #D4A574;
            font-size: 20px;
        }

        .header-decoration::before { left: 20px; }
        .header-decoration::after { right: 20px; }

        /* 主标题区域 */
        .hero-section {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(to bottom, rgba(139,69,19,0.05), transparent);
            border-bottom: 2px solid var(--border-color);
        }

        .hero-section h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(139,69,19,0.2);
            letter-spacing: 0.3em;
        }

        .hero-section .subtitle {
            font-size: 1.2rem;
            color: var(--secondary-color);
            font-style: italic;
            letter-spacing: 0.2em;
        }

        .hero-section .divider {
            width: 150px;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            margin: 20px auto;
        }

        /* 返回按钮 */
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 0.9rem;
            border: 2px solid var(--primary-color);
            margin: 20px 0;
        }

        .back-button:hover {
            background: transparent;
            color: var(--primary-color);
        }

        /* 内容区域 */
        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--accent-color);
        }

        /* 周纪标题 */
        .zhouji-title {
            text-align: center;
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* 周纪横向排列 */
        .zhouji-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .zhouji-item {
            flex: 1;
            min-width: 150px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .zhouji-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }

        .zhouji-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(139,69,19,0.15);
        }

        .zhouji-item h3 {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        /* 子目录 */
        .sub-directory {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .sub-item {
            margin-bottom: 10px;
            padding: 15px;
            background: rgba(212,165,116,0.1);
            border-left: 4px solid var(--primary-color);
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .sub-item:hover {
            background: rgba(212,165,116,0.2);
            transform: translateX(5px);
        }

        .sub-item h4 {
            font-size: 1.1rem;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .sub-item .btn {
            display: inline-block;
            padding: 8px 16px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 0.8rem;
            border: 2px solid var(--primary-color);
        }

        .sub-item .btn:hover {
            background: transparent;
            color: var(--primary-color);
        }

        /* 页脚 */
        .footer {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
        }

        .footer .decoration {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--secondary-color);
        }

        .footer p {
            margin: 8px 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero-section h1 {
                font-size: 2.2rem;
            }

            .content-section {
                padding: 30px 20px;
            }

            .zhouji-container {
                flex-direction: column;
                align-items: center;
            }

            .zhouji-item {
                width: 100%;
                max-width: 300px;
            }
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }
        .delay-5 { animation-delay: 1.0s; }
    </style>
</head>
<body>
    <div class="header-decoration"></div>

    <header class="hero-section">
        <h1>资治通鉴精读</h1>
        <div class="divider"></div>
        <p class="subtitle">历史智慧 · 现代启示</p>
        <a href="../index.html" class="back-button">返回首页</a>
    </header>

    <section class="content-section">
        <h2 class="section-title fade-in">目录</h2>
        
        <h3 class="zhouji-title fade-in">周纪</h3>
        
        <div class="zhouji-container">
            <div class="zhouji-item fade-in">
                <h3>周纪一</h3>
                <div class="sub-directory">
                    <div class="sub-item">
                        <h4>三家灭智</h4>
                        <a href="三家灭智/index.html" class="btn">阅读详情</a>
                    </div>
                </div>
            </div>
            <div class="zhouji-item fade-in delay-1">
                <h3>周纪二</h3>
            </div>
            <div class="zhouji-item fade-in delay-2">
                <h3>周纪三</h3>
            </div>
            <div class="zhouji-item fade-in delay-3">
                <h3>周纪四</h3>
            </div>
            <div class="zhouji-item fade-in delay-4">
                <h3>周纪五</h3>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="decoration">❖ ❖ ❖</div>
        <p>资治通鉴精读</p>
        <p>历史智慧 · 现代启示</p>
        <p>&copy; 2026 版权所有</p>
    </footer>

    <script>
        // 滚动动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in');
                }
            });
        }, observerOptions);

        // 观察所有需要动画的元素
        document.querySelectorAll('.zhouji-item, .section-title, .zhouji-title').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
