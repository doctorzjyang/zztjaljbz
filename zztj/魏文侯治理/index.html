<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魏文侯治理 - 资治通鉴</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8B4513;
            --secondary-color: #D4A574;
            --bg-color: #FDF6E3;
            --text-color: #3D2914;
            --accent-color: #C41E3A;
            --card-bg: #FFFBF0;
            --border-color: #D4A574;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background-color: var(--bg-color);
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D4A574' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                linear-gradient(to bottom, rgba(253,246,227,0.9), rgba(253,246,227,0.9));
            color: var(--text-color);
            line-height: 1.8;
        }

        /* 头部装饰 */
        .header-decoration {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #8B4513 100%);
            height: 8px;
            position: relative;
        }

        .header-decoration::before,
        .header-decoration::after {
            content: '❖';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #D4A574;
            font-size: 20px;
        }

        .header-decoration::before { left: 20px; }
        .header-decoration::after { right: 20px; }

        /* 主标题区域 */
        .hero-section {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(to bottom, rgba(139,69,19,0.05), transparent);
            border-bottom: 2px solid var(--border-color);
        }

        .hero-section h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(139,69,19,0.2);
            letter-spacing: 0.3em;
        }

        .hero-section .subtitle {
            font-size: 1.3rem;
            color: var(--secondary-color);
            font-style: italic;
            letter-spacing: 0.2em;
        }

        .hero-section .divider {
            width: 200px;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            margin: 25px auto;
        }

        /* 导航栏 */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(139,69,19,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 24px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-color);
        }

        .nav-tab:hover {
            background: var(--secondary-color);
            color: white;
            transform: translateY(-2px);
        }

        .nav-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 内容区域 */
        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 原文/白话文卡片 */
        .text-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(139,69,19,0.1);
            position: relative;
        }

        .text-card::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(212,165,116,0.3);
            border-radius: 5px;
            pointer-events: none;
        }

        .text-card h2 {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            padding-bottom: 15px;
        }

        .text-card h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--accent-color);
        }

        .original-text {
            font-size: 1.3rem;
            line-height: 2.2;
            text-align: justify;
            text-indent: 2em;
            color: var(--text-color);
        }

        .modern-text {
            font-size: 1.15rem;
            line-height: 2;
            text-align: justify;
            text-indent: 2em;
            color: var(--text-color);
        }

        /* AI回复卡片 */
        .ai-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(139,69,19,0.1);
        }

        .ai-header {
            background: linear-gradient(135deg, var(--primary-color), #A0522D);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ai-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .ai-name {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .ai-content {
            padding: 30px;
            font-size: 1rem;
            line-height: 1.9;
        }

        .ai-content h1 {
            color: var(--primary-color);
            margin: 30px 0 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .ai-content h2 {
            color: var(--primary-color);
            margin: 25px 0 15px;
            font-size: 1.3rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        .ai-content h3 {
            color: var(--primary-color);
            margin: 20px 0 10px;
            font-size: 1.2rem;
            border-left: 3px solid var(--secondary-color);
            padding-left: 12px;
        }

        .ai-content h4 {
            color: var(--text-color);
            margin: 15px 0 8px;
            font-size: 1.1rem;
        }

        .ai-content p {
            margin-bottom: 15px;
            text-align: justify;
        }

        .ai-content ul, .ai-content ol {
            margin: 15px 0 15px 30px;
        }

        .ai-content li {
            margin-bottom: 8px;
        }

        .ai-content strong {
            color: var(--accent-color);
        }

        .ai-content blockquote {
            border-left: 4px solid var(--secondary-color);
            padding-left: 20px;
            margin: 20px 0;
            color: #666;
            font-style: italic;
        }

        .ai-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 25px 0;
        }

        .ai-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .ai-content th, .ai-content td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        .ai-content th {
            background: rgba(139,69,19,0.1);
            font-weight: 600;
        }

        /* 外部链接 */
        .external-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .external-link:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        /* 返回按钮 */
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 0.9rem;
            border: 2px solid var(--primary-color);
            margin: 20px 0;
        }

        .back-button:hover {
            background: transparent;
            color: var(--primary-color);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to top, rgba(139,69,19,0.1), transparent);
            border-top: 2px solid var(--border-color);
            margin-top: 60px;
        }

        .footer p {
            color: var(--secondary-color);
            font-size: 0.95rem;
        }

        .footer .decoration {
            font-size: 1.5rem;
            margin: 15px 0;
            color: var(--accent-color);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero-section h1 {
                font-size: 2.2rem;
                letter-spacing: 0.2em;
            }

            .nav-tab {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            .text-card {
                padding: 25px;
            }

            .original-text {
                font-size: 1.1rem;
            }

            .modern-text {
                font-size: 1rem;
            }

            .ai-content {
                padding: 20px;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary-color);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        .note-box {
            background: rgba(196, 30, 58, 0.1);
            border-left: 4px solid var(--accent-color);
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 0 5px 5px 0;
        }
    </style>
</head>
<body>
    <div class="header-decoration"></div>
    
    <header class="hero-section">
        <h1>魏文侯治理</h1>
        <div class="divider"></div>
        <p class="subtitle">资治通鉴·周纪 | 魏文侯的治理之道</p>
        <a href="../index.html" class="back-button">返回目录</a>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" onclick="showSection('original')">原文与白话文</button>
        <button class="nav-tab" onclick="showSection('chatgpt')">ChatGPT</button>
        <button class="nav-tab" onclick="showSection('deepseek')">DeepSeek</button>
        <button class="nav-tab" onclick="showSection('gemini')">Gemini</button>
        <button class="nav-tab" onclick="showSection('grok')">Grok</button>
        <button class="nav-tab" onclick="showSection('kimi')">Kimi</button>
        <button class="nav-tab" onclick="showSection('zhipu')">智谱</button>
        <button class="nav-tab" onclick="showSection('qianwen')">千问</button>
    </nav>

    <!-- 原文与白话文 -->
    <section id="original" class="content-section active">
        <div class="text-card">
            <h2>📜 原文</h2>
            <p class="original-text"></p>
        </div>

        <div class="text-card">
            <h2>📖 白话文</h2>
            <p class="modern-text"></p>
        </div>
    </section>

    <!-- ChatGPT -->
    <section id="chatgpt" class="content-section">
        <div class="ai-card">
            <div class="ai-header">
                <div class="ai-icon">🤖</div>
                <div class="ai-name">ChatGPT</div>
            </div>
            <div class="ai-content">
            </div>
        </div>
    </section>

    <!-- DeepSeek -->
    <section id="deepseek" class="content-section">
        <div class="ai-card">
            <div class="ai-header">
                <div class="ai-icon">🧠</div>
                <div class="ai-name">DeepSeek</div>
            </div>
            <div class="ai-content">
            </div>
        </div>
    </section>

    <!-- Gemini -->
    <section id="gemini" class="content-section">
        <div class="ai-card">
            <div class="ai-header">
                <div class="ai-icon">✨</div>
                <div class="ai-name">Gemini</div>
            </div>
            <div class="ai-content">
            </div>
        </div>
    </section>

    <!-- Grok -->
    <section id="grok" class="content-section">
        <div class="ai-card">
            <div class="ai-header">
                <div class="ai-icon">⚡</div>
                <div class="ai-name">Grok</div>
            </div>
            <div class="ai-content">
            </div>
        </div>
    </section>

    <!-- Kimi -->
    <section id="kimi" class="content-section">
        <div class="ai-card">
            <div class="ai-header">
                <div class="ai-icon">🧠</div>
                <div class="ai-name">Kimi</div>
            </div>
            <div class="ai-content">
            </div>
        </div>
    </section>

    <!-- 智谱 -->
    <section id="zhipu" class="content-section">
        <div class="ai-card">
            <div class="ai-header">
                <div class="ai-icon">🧠</div>
                <div class="ai-name">智谱</div>
            </div>
            <div class="ai-content">
            </div>
        </div>
    </section>

    <!-- 千问 -->
    <section id="qianwen" class="content-section">
        <div class="ai-card">
            <div class="ai-header">
                <div class="ai-icon">💡</div>
                <div class="ai-name">千问</div>
            </div>
            <div class="ai-content">
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="decoration">❖ ❖ ❖</div>
        <p>魏文侯治理 - 资治通鉴精读</p>
        <p>历史智慧 · 现代启示</p>
        <p>&copy; 2026 版权所有</p>
    </footer>

    <script>
        // 显示指定区域
        function showSection(sectionId) {
            // 隐藏所有内容区域
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            
            // 移除所有导航标签的激活状态
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的内容区域
            document.getElementById(sectionId).classList.add('active');
            
            // 激活对应的导航标签
            event.currentTarget.classList.add('active');
        }

        // 加载Markdown文件内容
        async function loadMarkdownContent() {
            try {
                // 加载原文
                const originalResponse = await fetch('原文.md');
                const originalText = await originalResponse.text();
                document.querySelector('.original-text').textContent = originalText;
                
                // 加载白话文
                const modernResponse = await fetch('白话文.md');
                const modernText = await modernResponse.text();
                document.querySelector('.modern-text').textContent = modernText;
                
                // 加载ChatGPT
                const chatgptResponse = await fetch('chatgpt.md');
                const chatgptText = await chatgptResponse.text();
                document.querySelector('#chatgpt .ai-content').innerHTML = convertMarkdownToHtml(chatgptText);
                
                // 加载DeepSeek
                const deepseekResponse = await fetch('deepseek.md');
                const deepseekText = await deepseekResponse.text();
                document.querySelector('#deepseek .ai-content').innerHTML = convertMarkdownToHtml(deepseekText);
                
                // 加载Gemini
                const geminiResponse = await fetch('gemini.md');
                const geminiText = await geminiResponse.text();
                document.querySelector('#gemini .ai-content').innerHTML = convertMarkdownToHtml(geminiText);
                
                // 加载Grok
                const grokResponse = await fetch('grok.md');
                const grokText = await grokResponse.text();
                document.querySelector('#grok .ai-content').innerHTML = convertMarkdownToHtml(grokText);
                
                // 加载Kimi
                try {
                    const kimiResponse = await fetch('kimi.md');
                    const kimiText = await kimiResponse.text();
                    if (kimiText.trim()) {
                        document.querySelector('#kimi .ai-content').innerHTML = convertMarkdownToHtml(kimiText);
                    }
                } catch (error) {
                    console.log('Kimi.md可能不存在或为空');
                }
                
                // 加载智谱
                const zhipuResponse = await fetch('智谱.md');
                const zhipuText = await zhipuResponse.text();
                document.querySelector('#zhipu .ai-content').innerHTML = convertMarkdownToHtml(zhipuText);
                
                // 加载千问
                const qianwenResponse = await fetch('千问.md');
                const qianwenText = await qianwenResponse.text();
                document.querySelector('#qianwen .ai-content').innerHTML = convertMarkdownToHtml(qianwenText);
                
                console.log('Markdown内容加载完成');
            } catch (error) {
                console.error('加载Markdown内容失败:', error);
            }
        }

        // 将Markdown转换为HTML
        function convertMarkdownToHtml(markdown) {
            // 基本的Markdown转换
            let html = markdown
                // 标题
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^#### (.*$)/gim, '<h4>$1</h4>')
                // 粗体
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                // 斜体
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                // 无序列表
                .replace(/^\* (.*$)/gim, '<li>$1</li>')
                // 有序列表
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                // 引用
                .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
                // 分隔线
                .replace(/^---$/gim, '<hr>')
                // 代码块
                .replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>')
                // 表格
                .replace(/\|(.*)\|/gim, function(match) {
                    return match;
                });
            
            // 处理列表
            html = html.replace(/(<li>.*?<\/li>)/gs, '<ul>$1</ul>');
            
            // 处理段落
            html = html.replace(/^(?!<h|(<ul)|(<blockquote)|(<pre)|(<hr))(.*$)/gim, '<p>$2</p>');
            
            return html;
        }

        // 页面加载完成后执行
        window.onload = function() {
            console.log('页面加载完成');
            loadMarkdownContent();
        };
    </script>
</body>
</html>
