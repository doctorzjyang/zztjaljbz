<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国学智慧与健康 - 首页</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8B4513;
            --secondary-color: #D4A574;
            --bg-color: #FDF6E3;
            --text-color: #3D2914;
            --accent-color: #C41E3A;
            --card-bg: #FFFBF0;
            --border-color: #D4A574;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            background-color: var(--bg-color);
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D4A574' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                linear-gradient(to bottom, rgba(253,246,227,0.9), rgba(253,246,227,0.9));
            color: var(--text-color);
            line-height: 1.8;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 标题 */
        .title {
            text-align: center;
            margin-bottom: 60px;
        }

        .title h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* 卡片容器 */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(139,69,19,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px rgba(139,69,19,0.15);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .card h3 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .card p {
            color: var(--text-color);
            margin-bottom: 30px;
            text-align: justify;
        }

        .card .btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 1rem;
            border: 2px solid var(--primary-color);
        }

        .card .btn:hover {
            background: transparent;
            color: var(--primary-color);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .cards-container {
                grid-template-columns: 1fr;
            }

            .title h1 {
                font-size: 2rem;
            }

            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>国学智慧与健康</h1>
        </div>

        <div class="cards-container">
            <!-- 资治通鉴精读 -->
            <div class="card">

                <h3>资治通鉴精读</h3>
                <p>深入解读资治通鉴等经典著作，汲取历史智慧，指导现代生活。包含智氏兴衰、智伯灭族、豫让之义等经典历史事件的深入解读。</p>
                <a href="zztj/index.html" class="btn">查看目录</a>
            </div>

            <!-- 医案精读 -->
            <div class="card">
                <div class="card-icon">🏥</div>
                <h3>医案精读</h3>
                <p>精选《伤寒论》《金匮要略》等经典医籍中的案例，深入分析辨证思路与治疗方法，传承中医临床智慧。</p>
                <a href="ljbz/index.html" class="btn">查看医案</a>
            </div>

            <!-- 身高评估 -->
            <div class="card">
                <div class="card-icon">📊</div>
                <h3>身高评估</h3>
                <p>基于科学数据的身高评估工具，助力儿童健康成长。包括儿童身高预测、生长发育监测和营养运动指导。</p>
                <a href="sggy/height.html" class="btn">开始评估</a>
            </div>

            <!-- 伤寒论精读 -->
            <div class="card">
                <div class="card-icon">🩺</div>
                <h3>伤寒论精读</h3>
                <p>深入解读《伤寒论》经典条文，结合现代临床实践，传承张仲景医学思想，掌握六经辨证体系。</p>
                <a href="shl/index.html" class="btn">开始学习</a>
            </div>
        </div>
    </div>
</body>
</html>
