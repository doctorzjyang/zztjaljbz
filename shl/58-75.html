                        <strong class="text-[#8d6e63] text-base block mb-2">胡老讲义精要：</strong>
                        ${article.summary}
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });

        // Initialize ECharts Mind Map
        document.addEventListener("DOMContentLoaded", () => {
            const chartDom = document.getElementById('mindmap');
            const myChart = echarts.init(chartDom);
            
            const option = {
                tooltip: { trigger: 'item', triggerOn: 'mousemove' },
                series: [
                    {
                        type: 'tree',
                        data: [mindMapData],
                        top: '5%',
                        left: '10%',
                        bottom: '5%',
                        right: '25%',
                        symbolSize: 10,
                        symbol: 'circle',
                        itemStyle: {
                            color: '#8d6e63',
                            borderColor: '#4e342e'
                        },
                        label: {
                            position: 'left',
                            verticalAlign: 'middle',
                            align: 'right',
                            fontSize: 14,
                            fontFamily: 'Noto Serif SC',
                            color: '#3e2723',
                            backgroundColor: '#fffdf8',
                            padding: [4, 8],
                            borderRadius: 4,
                            borderColor: '#d7ccc8',
                            borderWidth: 1
                        },
                        leaves: {
                            label: {
                                position: 'right',
                                verticalAlign: 'middle',
                                align: 'left',
                                backgroundColor: '#f4ebe1',
                                borderColor: '#8d6e63'
                            }
                        },
                        lineStyle: {
                            color: '#d7ccc8',
                            width: 2,
                            curveness: 0.5
                        },
                        expandAndCollapse: true,
                        animationDuration: 550,
                        animationDurationUpdate: 750
                    }
                ]
            };
            
            myChart.setOption(option);
            
            // Handle window resize
            window.addEventListener('resize', () => {
                myChart.resize();
            });
        });
    </script>
</body>
</html>
